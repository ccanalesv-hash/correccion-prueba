<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-sm bg-light mb-4">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="inicio.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="pag2.html">Formulario</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="pag3.html">Contacto</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="pag4.html">Servicios</a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h1>Contáctanos</h1>
        <h2>Envíanos un mensaje</h2>

        <form class="mt-4" action="#" method="POST">
            <div class="mb-3">
                <label for="fname" class="form-label">Nombre:</label>
                <input type="text" id="fname" name="fname" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email:</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="subject" class="form-label">Asunto:</label>
                <input type="text" id="subject" name="subject" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="message" class="form-label">Mensaje:</label>
                <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </main>

    <footer class="bg-secondary text-white text-center py-3 mt-5 pie-pagina">
        Constanza Canales Vega
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
