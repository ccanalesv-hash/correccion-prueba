<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios - Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-sm bg-light mb-4">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="inicio.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="pag2.html">Formulario</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="pag3.html">Contacto</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="pag4.html">Servicios</a>
                </li>
            </ul>
            <img src="img/4470-gato-triste.png" alt="Gato triste" class="img-fluid" style="max-width: 80px;">
        </div>
    </nav>

    <div class="container">
        <header class="mb-4">
            <h1>Formularios</h1>
            <p class="text-muted">Sistema de Reservas</p>
        </header>

        <div class="row">
            <div class="col-md-6">
                <form action="#" method="POST">
                    
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre:</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required>
                    </div>

                    <div class="mb-3">
                        <label for="apellido" class="form-label">Apellido:</label>
                        <input type="text" class="form-control" id="apellido" name="apellido" required>
                    </div>

                    <div class="mb-3">
                        <label for="rut" class="form-label">Rut:</label>
                        <input type="text" class="form-control" id="rut" name="rut" placeholder="12.345.678-9" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="edad" class="form-label">Edad:</label>
                            <input type="number" class="form-control" id="edad" name="edad" min="1" max="120" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="sangre" class="form-label">Tipo de Sangre:</label>
                            <input type="text" class="form-control" id="sangre" name="sangre" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="direccion" class="form-label">Dirección:</label>
                        <input type="text" class="form-control" id="direccion" name="direccion" required>
                    </div>

                    <div class="mb-3">
                        <label for="telefono" class="form-label">Teléfono:</label>
                        <input type="tel" class="form-control" id="telefono" name="telefono" placeholder="+56 9 1234 5678" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Enviar Reserva</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="bg-secondary text-center py-3 pie-pagina">
        Constanza Canales Vega
    </footer>

</body>
</html>
